services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: persephone-api:local
    ports:
      - "8787:8787"
    volumes:
      - ./runs:/app/runs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      args:
        PUBLIC_PERSEPHONE_API_URL: http://127.0.0.1:8787
    image: persephone-ui:local
    depends_on:
      - api
    ports:
      - "5173:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
